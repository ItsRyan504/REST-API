<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Grading System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon">&#127979;</span>
        <div>
          <h1>School Grading System</h1>
          <p>Track student grades, performance, and academic standing.</p>
        </div>
      </div>
      <div class="header-right">
        <span id="api-status" class="badge badge-checking">Connecting&hellip;</span>
        <div id="user-info" class="user-info hidden">
          <span id="user-display" class="user-display"></span>
          <button class="btn btn-header-outline btn-sm" id="btn-logout">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <main class="layout">

    <!-- LEFT: Students Panel -->
    <aside class="panel students-panel">
      <div class="panel-header">
        <h2>Students</h2>
        <button class="btn btn-primary btn-sm" id="btn-add-student">
          &#43; Add Student
        </button>
      </div>

      <div class="search-wrap">
        <input
          type="text"
          id="search-input"
          class="input"
          placeholder="&#128269;  Search students…"
        />
      </div>

      <div id="students-list" class="students-list">
        <p class="placeholder-text">Loading students…</p>
      </div>
    </aside>

    <!-- RIGHT: Detail Panel -->
    <section class="panel detail-panel" id="detail-panel">
      <div id="detail-content" class="detail-empty">
        <span class="empty-icon">&#128101;</span>
        <p>Select a student from the list<br />to view grades and GWA.</p>
      </div>
    </section>

  </main>

  <!-- ===== Modal Overlay ===== -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

  <!-- ===== Auth Screen (shown when not logged in) ===== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">

      <div class="auth-brand">
        <span class="auth-brand-icon">&#127979;</span>
        <h2>School Grading System</h2>
        <p>Student Records Overview</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Login</button>
        <button class="auth-tab" id="tab-register">Register</button>
      </div>

      <!-- Error banner -->
      <div id="auth-error" class="auth-error" style="display:none"></div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input id="login-username" class="input" type="text"
            placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" class="input" type="password"
            placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary btn-full" id="btn-login">Login</button>
      </div>

      <!-- Register Form -->
      <div id="form-register" style="display:none">
        <div class="form-group">
          <label for="reg-fullname">Full Name *</label>
          <input id="reg-fullname" class="input" type="text"
            placeholder="e.g. Juan dela Cruz" maxlength="100" />
        </div>
        <div class="form-group">
          <label for="reg-username">Username *</label>
          <input id="reg-username" class="input" type="text"
            placeholder="Letters, numbers, underscore only" maxlength="30"
            autocomplete="username" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="reg-password">Password *</label>
            <input id="reg-password" class="input" type="password"
              placeholder="Min. 6 characters" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirm *</label>
            <input id="reg-confirm" class="input" type="password"
              placeholder="Repeat password" autocomplete="new-password" />
          </div>
        </div>
        <button class="btn btn-primary btn-full" id="btn-register">Create Account</button>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
